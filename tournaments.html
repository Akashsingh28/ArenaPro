<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournaments - ArenaPro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">🏆</div>
                <span class="logo-text">ARENA<span class="text-primary">PRO</span></span>
            </a>

            <div class="nav-links">
                <a href="index.html" class="nav-link">
                    <span class="nav-icon">🏠</span>
                    Home
                </a>
                <a href="tournaments.html" class="nav-link active">
                    <span class="nav-icon">🏆</span>
                    Tournaments
                </a>
                <div class="nav-dropdown">
                    <a href="teams.html" class="nav-link">
                        <span class="nav-icon">👥</span>
                        Teams
                    </a>
                    <div class="dropdown-menu">
                        <a href="teams.html" class="dropdown-item">👥 View All Teams</a>
                        <a href="create-team.html" class="dropdown-item">➕ Create Team</a>
                    </div>
                </div>
                <a href="leaderboard.html" class="nav-link">
                    <span class="nav-icon">🏅</span>
                    Leaderboard
                </a>
                <a href="#" class="nav-link" id="nav-notifications-btn" onclick="toggleNotifications(event)">
                    <span class="nav-icon">🔔</span>
                    <span id="nav-notif-count" style="background:#ff4757;color:#fff;border-radius:50%;padding:2px 6px;font-size:0.7rem;position:absolute;top:5px;right:5px;display:none;">0</span>
                    Alerts
                </a>
            </div>

            <a href="login.html" class="btn btn-primary">
                <span class="nav-icon">🔐</span>
                Login
            </a>
        </div>
        
        <!-- Notifications Dropdown -->
        <div id="notifications-dropdown" style="display:none;position:absolute;top:70px;right:20px;width:300px;background:var(--color-card);border:1px solid var(--color-border);border-radius:10px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.5);z-index:9999;max-height:400px;overflow-y:auto;padding:1rem;">
            <h3 style="font-size:1rem;margin-bottom:1rem;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:0.5rem;">Notifications</h3>
            <div id="notifications-list" style="display:flex;flex-direction:column;gap:10px;">
                <div style="text-align:center;color:var(--color-text-secondary);font-size:0.875rem;">Loading...</div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-gradient"></div>
        
        <div class="container" style="padding: 3rem 1rem;">
            <div class="hero-content">
                <h1 class="hero-title" style="font-size: 3rem; margin-bottom: 1rem;">
                    <span class="text-primary glow">Tournaments</span>
                </h1>
                <p class="hero-description" style="margin-bottom: 0;">
                    Join exciting esports tournaments and compete for amazing prizes
                </p>
            </div>
        </div>
    </section>

    <!-- Tournaments List -->
    <section class="section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">All Tournaments</h2>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <div style="flex:1;">
                        <input type="text" id="tournament-search" oninput="debounceSearch()" placeholder="Search tournaments..." class="filter-select" style="width: 100%;">
                    </div>
                    <select id="game-filter" class="filter-select">
                        <option value="all">All Games</option>
                        <option value="Free Fire">Free Fire</option>
                        <option value="BGMI">BGMI</option>
                        <option value="Valorant">Valorant</option>
                        <option value="COD Mobile">COD Mobile</option>
                        <option value="Clash of Clans">Clash of Clans</option>
                    </select>
                    <select id="status-filter" class="filter-select">
                        <option value="all">All Status</option>
                        <option value="open">Open</option>
                        <option value="ongoing">Ongoing</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
            </div>

            <div id="tournaments-list" class="tournaments-grid">
                <!-- Tournaments will be loaded here by JavaScript -->
            </div>

            <!-- Pagination Controls -->
            <div id="pagination-controls" style="display:flex; justify-content:center; gap:1rem; margin-top:2rem;">
                <button class="btn btn-outline" id="prev-page" onclick="changePage(-1)" disabled>Previous</button>
                <div style="display:flex; align-items:center; color:var(--color-text-secondary);" id="page-indicator">Page 1</div>
                <button class="btn btn-outline" id="next-page" onclick="changePage(1)" disabled>Next</button>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; Akash Singh</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        let currentPage = 1;
        let limit = 6;
        let searchTimeout = null;
        let totalPages = 1;

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentPage = 1;
                loadTournaments();
            }, 500);
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                loadTournaments();
            }
        }

        // Load tournaments from the API
        async function loadTournaments() {
            const container = document.getElementById('tournaments-list');
            const gameFilter   = document.getElementById('game-filter').value;
            const statusFilter = document.getElementById('status-filter').value;
            const searchQ      = document.getElementById('tournament-search').value;

            container.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--color-text-secondary);grid-column: 1 / -1;">Loading tournaments...</div>';

            try {
                const params = new URLSearchParams();
                if (gameFilter   !== 'all') params.append('game',   gameFilter);
                if (statusFilter !== 'all') params.append('status', statusFilter);
                if (searchQ)                params.append('search', searchQ);
                params.append('page', currentPage);
                params.append('limit', limit);

                const data        = await apiFetch(`/tournaments?${params}`);
                const tournaments = data.data;
                const pag = data.pagination || { pages: 1 };
                totalPages = pag.pages;

                document.getElementById('page-indicator').textContent = `Page ${currentPage} of ${Math.max(1, totalPages)}`;
                document.getElementById('prev-page').disabled = currentPage <= 1;
                document.getElementById('next-page').disabled = currentPage >= totalPages;

                if (tournaments.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--color-text-secondary);grid-column: 1 / -1;">No tournaments found.</div>';
                    return;
                }

                container.innerHTML = tournaments.map(t => `
                    <div class="tournament-card">
                        <div class="tournament-accent"></div>
                        <div class="tournament-content">
                            <div class="tournament-header">
                                <div>
                                    <h3 class="tournament-name">${t.name}</h3>
                                    <p class="tournament-game">${t.game}</p>
                                </div>
                                <div class="tournament-icon">🏆</div>
                            </div>
                            <div class="tournament-details">
                                <div class="detail-row">
                                    <span class="detail-label">Prize Pool</span>
                                    <span class="detail-value primary">₹${t.prizePool.toLocaleString()}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Entry Fee</span>
                                    <span class="detail-value">${t.entryFee === 0 ? 'Free' : '₹' + t.entryFee}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Teams</span>
                                    <span class="detail-value">${t.registeredTeams}/${t.maxTeams}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Date</span>
                                    <span class="detail-value">${new Date(t.date).toLocaleDateString()}</span>
                                </div>
                            </div>
                            <a href="tournament-details.html?id=${t._id}" class="btn btn-primary btn-full">View Details</a>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--color-primary);">⚠️ ${err.message}<br><small style="color:var(--color-text-secondary)">Make sure the backend server is running on port 5000.</small></div>`;
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTournaments();
            document.getElementById('game-filter').addEventListener('change',   loadTournaments);
            document.getElementById('status-filter').addEventListener('change', loadTournaments);
        });
    </script>

    <style>
        .filter-select {
            padding: 0.5rem 1rem;
            background-color: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: 0.5rem;
            color: var(--color-text);
            font-family: var(--font-body);
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .filter-select option {
            background-color: var(--color-card);
            color: var(--color-text);
        }
    </style>
</body>
</html>
